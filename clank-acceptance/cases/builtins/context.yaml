name: "context"
cases:
  # ---------------------------------------------------------------------------
  # context show
  # ---------------------------------------------------------------------------
  - name: show_after_clear_is_empty
    # Clear first so the transcript is empty, then show — stdout must be empty.
    stdin: |
      context clear
      context show
    expect_exit: 0
    expect_stdout: ""
    expect_stderr_empty: true

  - name: show_output_is_not_re_recorded
    # If show's output were recorded back into the transcript, a second show
    # would produce more lines than the first. After a clear, both shows must
    # produce empty output — proving that show does not record its own output.
    stdin: |
      context clear
      context show
      context show
    expect_exit: 0
    expect_stdout: ""
    expect_stderr_empty: true

  # ---------------------------------------------------------------------------
  # context clear
  # ---------------------------------------------------------------------------
  - name: clear_empties_transcript
    stdin: |
      context clear
      context show
    expect_exit: 0
    # After clear, show has nothing to print — stdout is empty.
    expect_stdout: ""
    expect_stderr_empty: true

  # ---------------------------------------------------------------------------
  # context trim
  # ---------------------------------------------------------------------------
  - name: trim_zero_is_noop
    stdin: |
      context trim 0
      context show
    expect_exit: 0
    # trim 0 is a no-op; the entry (the script text) is still present.
    expect_stdout_contains: "context trim 0"
    expect_stderr_empty: true

  - name: trim_one_removes_only_entry
    stdin: |
      context trim 1
      context show
    expect_exit: 0
    # trim 1 removes the only entry; show prints nothing.
    expect_stdout: ""
    expect_stderr_empty: true

  - name: trim_exceeding_count_clears_all
    stdin: |
      context trim 999
      context show
    expect_exit: 0
    expect_stdout: ""
    expect_stderr_empty: true

  # ---------------------------------------------------------------------------
  # Error cases
  # ---------------------------------------------------------------------------
  - name: trim_non_integer_exits_2
    stdin: |
      context trim notanumber
    expect_exit: 2
    expect_stderr_empty: false

  - name: trim_missing_argument_exits_2
    stdin: |
      context trim
    expect_exit: 2
    expect_stderr_empty: false

  - name: unknown_subcommand_exits_2
    stdin: |
      context unknowncmd
    expect_exit: 2
    expect_stderr_empty: false

  - name: no_subcommand_exits_2
    stdin: |
      context
    expect_exit: 2
    expect_stderr_empty: false
